# Config commands
bindsym $mod+Shift+q kill
bindsym $mod+Shift+c reload
bindsym $mod+Shift+r restart
bindsym --release $mod+F4 exec xkill

# Default Programs
set $term kitty
set $texteditor xed
set $filemanager nemo

bindsym $mod+Return exec $term
bindsym $mod+Shift+t exec $texteditor
bindsym $mod+Shift+f exec $filemanager

# Window resizing
mode "resize" {
        bindsym j resize shrink width 2 px or 2 ppt
        bindsym k resize grow height 2 px or 2 ppt
        bindsym l resize shrink height 2 px or 2 ppt
        bindsym ccaron resize grow width 2 px or 2 ppt

        bindsym Left rnesize shrink width 2 px or 2 ppt
        bindsym Down resize grow height 2 px or 2 ppt
        bindsym Up resize shrink height 2 px or 2 ppt
        bindsym Right resize grow width 2 px or 2 ppt

        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym $mod+r mode "default"
}
bindsym $mod+r mode "resize"

# Bindings for every ROFI thing that I use
bindsym $mod+b exec nbrowser
bindsym $mod+d exec rofi -show drun
bindsym $mod+n exec /home/o5-13/Tools/rofi-nm/rofi-network-manager.sh
bindsym $mod+shift+a exec rofi -show power-menu -modi power-menu:rofi-power-menu

# Change focused containers
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Move focused container
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Manualy split window [Vertical or Horizontal]
bindsym $mod+h split h
bindsym $mod+v split v

# Use pactl to adjust volume in PulseAudio.
set $refresh_i3status killall -SIGUSR1 i3status
bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +5% && $refresh_i3status
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -5% && $refresh_i3status
bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status
bindsym XF86AudioMicMute exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle && $refresh_i3status

# Sreen brightness controls
bindsym XF86MonBrightnessUp exec light -A 10
bindsym XF86MonBrightnessDown exec light -U 10

# Media player controls
bindsym XF86AudioPlay exec playerctl play
bindsym XF86AudioStop exec playerctl pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous

# Take a screenshot and saves it [or choose part of the screen]
bindsym --release $mod+x exec --no-startup-id import ~/Pictures/Crops/cropped.png
bindsym Print exec scrot ~/Pictures/Screenshots/Screenshot.png && notify-send "Screenshot Took!" "Saved in ~/Pictures folder."
