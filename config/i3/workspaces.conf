# Opening specific programs in certain WorkSpaces
assign [class="vlc"] → $ws4
assign [class="Xed"] → $ws5
assign [class="ViberPC"] → $ws3
assign [class="firefox"] → $ws6
assign [class="Tor Browser"] → $ws7
for_window [class="Spotify"] move to workspace $ws2
for_window [class="discord"] move to workspace $ws3
for_window [title="Mozilla Firefox Private Browsin"] move to workspace $ws8

# Define what monitor / desktop setup will user pick
mode "Setup: [S]ingle | [D]ual | [T]elevision"
{
	 bindsym S exec ~/.config/i3/shells/SingleMon.sh, mode "default"
	 bindsym D exec ~/.config/i3/shells/DualMon.sh, mode "default"
	 bindsym T exec ~/.config/i3/shells/TVMon.sh, mode "default"
	 bindsym Escape mode "default"
  bindsym Return mode "default"
}
bindsym $mod+ctrl+s mode "Setup: [S]ingle | [D]ual | [T]elevision"

