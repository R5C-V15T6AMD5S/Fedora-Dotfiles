# Opening specific programs in certain WorkSpaces
assign [class="vlc"] → $ws4
assign [class="Xed"] → $ws5
assign [class="ViberPC"] → $ws3
assign [class="firefox"] → $ws6
assign [class="Tor Browser"] → $ws7
assign [class="thunderbird"] → $ws8
assign [class="Whatsapp-for-linux"] → $ws3
for_window [class="Spotify"] move to workspace $ws2
for_window [class="discord"] move to workspace $ws3
for_window [title="Mozilla Firefox Private Browsin"] move to workspace $ws7
for_window [class="Nemo-preview-start"] border pixel 6, move left 300 px, move up 125 px
for_window [class="Org.gnome.NautilusPreviewer"] border pixel 6, move left 300 px, move up 125 px

##########################################################################
##########################################################################


set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws0 "0"

workspace $ws1 output $Primary
workspace $ws2 output $Primary
workspace $ws3 output $Primary
workspace $ws4 output $Primary
workspace $ws5 output $Primary
workspace $ws6 output $Primary
workspace $ws7 output $Primary
workspace $ws8 output $Primary
workspace $ws9 output $Primary
workspace $ws0 output $Primary

bindsym $mod+1 workspace number $ws1
bindsym $mod+2 workspace number $ws2
bindsym $mod+3 workspace number $ws3
bindsym $mod+4 workspace number $ws4
bindsym $mod+5 workspace number $ws5
bindsym $mod+6 workspace number $ws6
bindsym $mod+7 workspace number $ws7
bindsym $mod+8 workspace number $ws8
bindsym $mod+9 workspace number $ws9
bindsym $mod+0 workspace number $ws0

bindsym $mod+Shift+1 move container to workspace number $ws1; workspace $ws1
bindsym $mod+Shift+2 move container to workspace number $ws2; workspace $ws2
bindsym $mod+Shift+3 move container to workspace number $ws3; workspace $ws3
bindsym $mod+Shift+4 move container to workspace number $ws4; workspace $ws4
bindsym $mod+Shift+5 move container to workspace number $ws5; workspace $ws5
bindsym $mod+Shift+6 move container to workspace number $ws6; workspace $ws6
bindsym $mod+Shift+7 move container to workspace number $ws7; workspace $ws7
bindsym $mod+Shift+8 move container to workspace number $ws8; workspace $ws8
bindsym $mod+Shift+9 move container to workspace number $ws9; workspace $ws9
bindsym $mod+Shift+0 move container to workspace number $ws0; workspace $ws0


